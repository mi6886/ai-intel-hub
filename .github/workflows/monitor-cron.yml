name: Hourly Monitor

on:
  # Schedule disabled 2026-04-11: cn8n path replaced by MediaCrawler runner
  # on MacBook Air. Re-enable by uncommenting if Air path fails.
  # schedule:
  #   - cron: '17 * * * *'  # Every hour at :17
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitor
        run: |
          curl -s -X POST 'https://ai-intel-hub.onrender.com/api/monitor' \
            -H 'Content-Type: application/json' \
            -d '{"action":"run"}'
